<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEXI BOT Interface</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">

<style>

/* --- Base Setup --- */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body { background-color: #000; color: #fff; padding: 15px; min-height: 100vh; }

/* --- Header Section --- */
.header-container {
display:flex;
justify-content:space-between;
align-items:center;
width:100%;
border-bottom:1px solid rgba(255,255,255,0.1);
padding-bottom:15px;
margin-bottom:20px;
}

.logo-section { display:flex; align-items:center; gap:10px; }

.logo-box{
background:#e2dcc2;
width:38px;
height:38px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
}

.brand-name{font-size:20px;font-weight:800;}

.actions{display:flex;gap:10px;}

.notification-btn{
position:relative;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:9px;
border-radius:12px;
color:#a1a1aa;
}

.online-dot{
position:absolute;
top:0;
right:0;
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
border:1.5px solid #000;
}

.wallet-btn {
background:rgba(226,220,194,0.1);
border:1px solid rgba(226,220,194,0.2);
color:#e2dcc2;
padding:8px 14px;
border-radius:12px;
font-size:13px;
font-weight:600;
display:flex;
align-items:center;
gap:6px;
}

.wallet-btn span { color:#fff; }

/* -------- DIAMOND SHOP -------- */

.container{
max-width:450px;
margin:auto;
}

input,select{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #333;
background:#000;
color:white;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:15px;
}

.box{
background:#111;
border:1px solid #222;
border-radius:15px;
padding:20px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.box:hover{
border-color:#ff0044;
box-shadow:0 0 10px rgba(255,0,68,.5);
}

.box.active{
background:linear-gradient(45deg,#ff0044,#7b00ff);
}

.diamond{
font-size:20px;
}

.price{
color:#ffcc00;
margin-top:5px;
font-size:18px;
}

.next-btn{
width:100%;
padding:16px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#ff0044,#7b00ff);
color:white;
font-family:'Orbitron';
font-weight:700;
cursor:pointer;
}

/* -------- BOTTOM NAV -------- */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:75px;
background:#050505;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #1a1a1a;
}

.nav-item{
text-decoration:none;
display:flex;
flex-direction:column;
align-items:center;
color:#71717a;
padding:10px;
border-radius:14px;
flex:1;
}

.nav-item.active{
background:#18181b;
color:#fff;
}

.nav-item span{
font-size:11px;
margin-top:4px;
}

.nav-item svg{
width:22px;
height:22px;
}

</style>
</head>

<body>

<div class="header-container">
<div class="logo-section">
<div class="logo-box">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><path d="M13 2 L3 14 L12 14 L11 22 L21 10 L12 10 Z"/></svg>
</div>
<h1 class="brand-name">ZEXI BOT</h1>
</div>

<div class="actions">
<div class="notification-btn">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
<span class="online-dot"></span>
</div>

<div class="wallet-btn">
Wallet: <span id="walletBalance">₹0</span>
</div>
</div>
</div>

<div class="container">

<input type="number" id="uidInput" placeholder="Enter Your UID">

<select>
<option>Select Country / Region</option>
<option>India</option>
<option>Bangladesh</option>
<option>Pakistan</option>
<option>Brazil</option>
<option>Indonesia</option>
<option>Thailand</option>
<option>Vietnam</option>
<option>Singapore</option>
<option>Malaysia</option>
</select>

<div class="grid">

<div class="box" onclick="selectDiamond(this)">
<div class="diamond">💎 380 Diamonds</div>
<div class="price">1 credit</div>
</div>

<div class="box" onclick="selectDiamond(this)">
<div class="diamond">💎 800 Diamonds</div>
<div class="price">2 credit</div>
</div>

<div class="box" onclick="selectDiamond(this)">
<div class="diamond">💎 1600 Diamonds</div>
<div class="price">5 credit</div>
</div>

<div class="box" onclick="selectDiamond(this)">
<div class="diamond">💎 2200 Diamonds</div>
<div class="price">10 credit</div>
</div>

</div>

<button class="next-btn" onclick="goNext()">NEXT</button>

</div>

<nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span>Home</span>
        </a>
        <a href="payment.html" class="nav-item ">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
            <span>Transactions</span>
        </a>
        <a href="diamond.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>
            <span>Discount</span>
        </a>
        <a href="history.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>History</span>
        </a>
        <a href="account.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Account</span>
        </a>
    </nav>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCvMVx_geWeeiNgw0ziSR80mvncHlOwKQY",
authDomain: "zexi-bot.firebaseapp.com",
projectId: "zexi-bot",
storageBucket: "zexi-bot.firebasestorage.app",
messagingSenderId: "245993811972",
appId: "1:245993811972:web:e25ed7ef03d118a4fd8551"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const userId = "user1";
let wallet = 0;

async function loadWallet(){

const ref = doc(db,"users",userId);
const snap = await getDoc(ref);

if(snap.exists()){
wallet = snap.data().wallet || 0;
}else{
wallet = 0;
await setDoc(ref,{wallet:0});
}

document.getElementById("walletBalance").innerText="₹"+wallet;

}

loadWallet();

window.selectDiamond = function(el){
document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

window.goNext = async function(){

let uid=document.getElementById("uidInput").value;
let selected=document.querySelector(".box.active");

if(uid==""){
alert("Enter UID first");
return;
}

if(!selected){
alert("Please select diamond package");
return;
}

let priceText=selected.querySelector(".price").innerText;
let requiredCredits=parseInt(priceText);

if(wallet < requiredCredits){
alert("Not enough credits in wallet");
return;
}

wallet -= requiredCredits;

document.getElementById("walletBalance").innerText="₹"+wallet;

await updateDoc(doc(db,"users",userId),{
wallet:wallet
});

let plan=selected.querySelector(".diamond").innerText;

localStorage.setItem("diamond_uid",uid);
localStorage.setItem("diamond_plan",plan);
localStorage.setItem("diamond_price",priceText);

window.location.href="diamond-result.html";

}

</script>

</body>
</html>
