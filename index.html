<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zexi Tool - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-bar">
        <div class="top-bar-logo">
            <img src="https://i.ibb.co/1GYZjys1/Screenshot-20260401-005238-You-Tube.jpg" alt="Logo Small">
        </div>
        <div class="top-bar-text">
            <h2>ZEXI TOOL</h2>
            <p>Free Fire TCP & Clan Bot Maker</p>
        </div>
    </nav>

    <div class="container">
        <header class="header">
            <div class="logo-container">
                <img src="https://i.ibb.co/1GYZjys1/Screenshot-20260401-005238-You-Tube.jpg" alt="Zexi Logo">
            </div>
            <h1>ZEXI TOOL</h1>
            <p>Free Fire Bot Maker</p>
        </header>

        <div class="card-wrapper">
            <main class="login-card">
                
                <div class="tabs">
                    <button class="tab-btn active" id="btn-tab-login">
                        <i class="fa-solid fa-right-to-bracket"></i> LOGIN
                    </button>
                    <button class="tab-btn inactive" id="btn-tab-signup">
                        <i class="fa-solid fa-user-plus"></i> SIGN UP
                    </button>
                </div>

                <div class="form-container">
                    
                    <div id="form-login" class="form-section active">
                        <form id="login-form">
                            <div class="input-group">
                                <label><i class="fa-solid fa-envelope"></i> Email</label>
                                <div class="input-wrapper">
                                    <input type="email" id="login-email" placeholder="Enter your email" required>
                                </div>
                            </div>

                            <div class="input-group">
                                <label><i class="fa-solid fa-lock"></i> Password</label>
                                <div class="input-wrapper">
                                    <input type="password" id="login-pwd" placeholder="Enter your password" required minlength="6">
                                    <i class="fa-solid fa-eye toggle-password" data-target="login-pwd"></i>
                                </div>
                            </div>

                            <div class="cf-turnstile-wrapper">
                                <div class="cf-turnstile" data-sitekey="0x4AAAAAAC8lTuh4SAF3kFf9" data-theme="dark"></div>
                            </div>

                            <div class="security-badge">
                                <i class="fa-solid fa-shield-check"></i> Secure Encrypted Authentication
                            </div>

                            <button type="submit" class="btn-main" id="submit-login">
                                <span class="spinner"></span>
                                <i class="fa-solid fa-right-to-bracket"></i>
                                <span class="btn-text">LOGIN</span>
                            </button>
                        </form>

                        <div class="divider">OR</div>

                        <button class="btn-secondary" id="go-to-signup">
                            <i class="fa-solid fa-user-plus"></i> CREATE NEW ACCOUNT
                        </button>
                    </div>

                    <div id="form-signup" class="form-section">
                        <form id="signup-form">
                            <div class="input-group">
                                <label><i class="fa-solid fa-envelope"></i> Email</label>
                                <div class="input-wrapper">
                                    <input type="email" id="signup-email" placeholder="Choose an email" required>
                                </div>
                            </div>

                            <div class="input-group">
                                <label><i class="fa-solid fa-lock"></i> Password</label>
                                <div class="input-wrapper">
                                    <input type="password" id="signup-pwd" placeholder="Create a password (min 6 chars)" required minlength="6">
                                    <i class="fa-solid fa-eye toggle-password" data-target="signup-pwd"></i>
                                </div>
                            </div>

                            <div class="input-group">
                                <label><i class="fa-solid fa-shield-halved"></i> Confirm Password</label>
                                <div class="input-wrapper">
                                    <input type="password" id="signup-pwd-confirm" placeholder="Confirm your password" required minlength="6">
                                    <i class="fa-solid fa-eye toggle-password" data-target="signup-pwd-confirm"></i>
                                </div>
                            </div>

                            <div class="cf-turnstile-wrapper">
                                <div class="cf-turnstile" data-sitekey="0x4AAAAAAC8lTuh4SAF3kFf9" data-theme="dark"></div>
                            </div>

                            <div class="security-badge">
                                <i class="fa-solid fa-shield-check"></i> Secure Encrypted Authentication
                            </div>

                            <button type="submit" class="btn-main" id="submit-signup">
                                <span class="spinner"></span>
                                <i class="fa-solid fa-user-plus"></i>
                                <span class="btn-text">SIGN UP</span>
                            </button>
                        </form>
                        
                        <div class="divider">OR</div>

                        <button class="btn-secondary" id="go-to-login">
                            <i class="fa-solid fa-arrow-left"></i> BACK TO LOGIN
                        </button>
                    </div>

                </div>
            </main>
        </div>

        <section class="social-section">
            <div class="social-header">
                <i class="fa-solid fa-share-nodes"></i> CONNECT
            </div>
            
            <div class="social-grid">
                <a href="https://youtube.com/@firezexiyt" target="_blank" rel="noopener noreferrer" class="social-btn youtube">
                    <i class="fa-brands fa-youtube icon"></i>
                    <div class="info">
                        <span class="title">YouTube</span>
                        <span class="handle">@FIREZEXIYT</span>
                    </div>
                </a>
                
                <a href="https://youtube.com/@zexistey" target="_blank" rel="noopener noreferrer" class="social-btn youtube">
                    <i class="fa-brands fa-youtube icon"></i>
                    <div class="info">
                        <span class="title">YouTube</span>
                        <span class="handle">@ZEXISTEY</span>
                    </div>
                </a>

                <a href="https://t.me/Realzexi" target="_blank" rel="noopener noreferrer" class="social-btn telegram">
                    <i class="fa-brands fa-telegram icon"></i>
                    <div class="info">
                        <span class="title">Telegram</span>
                        <span class="handle">@Realzexihere</span>
                    </div>
                </a>

                <a href="https://wa.me/7310020450" target="_blank" rel="noopener noreferrer" class="social-btn whatsapp">
                    <i class="fa-brands fa-whatsapp icon"></i>
                    <div class="info">
                        <span class="title">WhatsApp</span>
                        <span class="handle">Chat Now</span>
                    </div>
                </a>
            </div>
        </section>

        <footer class="footer">
            <span>ZEXI TOOL</span> &copy; 2026 All Rights Reserved
        </footer>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
