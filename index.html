<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zexi Tool - Secure Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="tactical-bg">
        <div class="bg-grid"></div>
        <div class="bg-vignette"></div>
        <div class="bg-glow-orb"></div>
    </div>

    <div id="toast-container" class="toast-container">
        </div>

    <nav class="top-bar">
        <div class="top-bar-logo">
            <img src="https://img.freepik.com/premium-vector/esports-logo-game-mascot_139366-1076.jpg" alt="Zexi Logo">
        </div>
        <div class="top-bar-text">
            <h2>ZEXI TOOL</h2>
            <p>GUILD_GLORY_BOT_V2</p>
        </div>
        <div class="top-bar-status">
            <span class="status-dot"></span>
            <span>SECURE CONNECTION</span>
        </div>
    </nav>

    <div class="container">
        <header class="header">
            <div class="logo-container">
                <div class="logo-ring"></div>
                <img src="https://img.freepik.com/premium-vector/esports-logo-game-mascot_139366-1076.jpg" alt="Zexi Avatar">
            </div>
            <h1>ZEXI TOOL</h1>
            <p>Awaiting operator authentication...</p>
        </header>

        <div class="card-wrapper">
            <main class="login-card">
                
                <div class="tabs">
                    <button class="tab-btn active" id="btn-tab-login">
                        <i class="fa-solid fa-terminal"></i> Login
                    </button>
                    <button class="tab-btn inactive" id="btn-tab-signup">
                        <i class="fa-solid fa-user-plus"></i> Register
                    </button>
                    <div class="tab-indicator"></div>
                </div>

                <div class="form-container">
                    
                    <div id="form-login" class="form-section active">
                        <form id="login-form">
                            <div class="input-group">
                                <label>OPERATOR EMAIL</label>
                                <div class="input-wrapper">
                                    <i class="fa-solid fa-envelope input-icon"></i>
                                    <input type="email" id="login-email" placeholder="admin@zexitool.com" required autocomplete="username">
                                    <div class="input-border-bottom"></div>
                                </div>
                            </div>

                            <div class="input-group">
                                <label>SECURITY CLEARANCE (PASSWORD)</label>
                                <div class="input-wrapper">
                                    <i class="fa-solid fa-lock input-icon"></i>
                                    <input type="password" id="login-pwd" placeholder="••••••••" required minlength="6" autocomplete="current-password">
                                    <i class="fa-solid fa-eye toggle-password" data-target="login-pwd"></i>
                                    <div class="input-border-bottom"></div>
                                </div>
                            </div>

                            <div class="cf-turnstile-wrapper">
                                <div class="cf-turnstile" data-sitekey="0x4AAAAAAC8lTuh4SAF3kFf9" data-theme="dark"></div>
                            </div>

                            <div class="security-badge">
                                <i class="fa-solid fa-shield-halved"></i> <span>256-BIT ENCRYPTED TUNNEL</span>
                            </div>

                            <button type="submit" class="btn-main" id="submit-login">
                                <span class="spinner"></span>
                                <span class="btn-text">INITIALIZE SESSION</span>
                                <i class="fa-solid fa-arrow-right-to-bracket"></i>
                                <div class="btn-glow"></div>
                            </button>
                        </form>

                        <div class="divider"><span>OR OVERRIDE VIA</span></div>

                        <button class="btn-secondary" id="go-to-signup">
                            REQUEST NEW CLEARANCE
                        </button>
                    </div>

                    <div id="form-signup" class="form-section">
                        <form id="signup-form">
                            <div class="input-group">
                                <label>NEW OPERATOR EMAIL</label>
                                <div class="input-wrapper">
                                    <i class="fa-solid fa-envelope input-icon"></i>
                                    <input type="email" id="signup-email" placeholder="new@zexitool.com" required autocomplete="username">
                                    <div class="input-border-bottom"></div>
                                </div>
                            </div>

                            <div class="input-group">
                                <label>SECURE PASSWORD</label>
                                <div class="input-wrapper">
                                    <i class="fa-solid fa-lock input-icon"></i>
                                    <input type="password" id="signup-pwd" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
                                    <i class="fa-solid fa-eye toggle-password" data-target="signup-pwd"></i>
                                    <div class="input-border-bottom"></div>
                                </div>
                            </div>

                            <div class="input-group">
                                <label>VERIFY SECURITY KEY</label>
                                <div class="input-wrapper">
                                    <i class="fa-solid fa-shield-check input-icon"></i>
                                    <input type="password" id="signup-pwd-confirm" placeholder="Repeat password" required minlength="6" autocomplete="new-password">
                                    <i class="fa-solid fa-eye toggle-password" data-target="signup-pwd-confirm"></i>
                                    <div class="input-border-bottom"></div>
                                </div>
                            </div>

                            <div class="cf-turnstile-wrapper">
                                <div class="cf-turnstile" data-sitekey="0x4AAAAAAC8lTuh4SAF3kFf9" data-theme="dark"></div>
                            </div>

                            <button type="submit" class="btn-main" id="submit-signup">
                                <span class="spinner"></span>
                                <span class="btn-text">REGISTER PROFILE</span>
                                <i class="fa-solid fa-user-shield"></i>
                                <div class="btn-glow"></div>
                            </button>
                        </form>
                        
                        <div class="divider"><span>EXISTING OPERATOR?</span></div>

                        <button class="btn-secondary" id="go-to-login">
                            ABORT & RETURN TO LOGIN
                        </button>
                    </div>

                </div>
            </main>
        </div>

        <section class="social-section">
            <div class="social-grid">
                <a href="https://youtube.com/@firezexiyt" target="_blank" rel="noopener noreferrer" class="social-btn">
                    <div class="icon-box yt"><i class="fa-brands fa-youtube icon"></i></div>
                    <div class="social-text">
                        <span class="platform">YouTube</span>
                        <span class="handle">@FIREZEXIYT</span>
                    </div>
                </a>
                <a href="https://youtube.com/@zexistey" target="_blank" rel="noopener noreferrer" class="social-btn">
                    <div class="icon-box yt"><i class="fa-brands fa-youtube icon"></i></div>
                    <div class="social-text">
                        <span class="platform">YouTube</span>
                        <span class="handle">@ZEXISTEY</span>
                    </div>
                </a>
                <a href="https://t.me/Realzexi" target="_blank" rel="noopener noreferrer" class="social-btn">
                    <div class="icon-box tg"><i class="fa-brands fa-telegram icon"></i></div>
                    <div class="social-text">
                        <span class="platform">Telegram</span>
                        <span class="handle">@Realzexihere</span>
                    </div>
                </a>
                <a href="https://wa.me/7310020450" target="_blank" rel="noopener noreferrer" class="social-btn">
                    <div class="icon-box wa"><i class="fa-brands fa-whatsapp icon"></i></div>
                    <div class="social-text">
                        <span class="platform">WhatsApp</span>
                        <span class="handle">Chat Support</span>
                    </div>
                </a>
            </div>
        </section>

        <footer class="footer">
            <p>ENGINEERED BY <strong class="brand-text">ZEXI TOOL</strong> &copy; 2026</p>
        </footer>
    </div>

    <script type="module" src="js/script.js"></script>
</body>
</html>
