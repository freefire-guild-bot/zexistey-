<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS BOT</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Rajdhani',sans-serif;
}

body{
background:#050505;
color:white;
min-height:100vh;
padding-bottom:120px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:#0b0b0b;
border-bottom:1px solid #222;
position:relative;
z-index:1000;
}

.logo{
font-family:'Orbitron';
color:#ffcc00;
font-weight:700;
}

.menu{
font-size:24px;
cursor:pointer;
}

/* DROPDOWN */

.dropdown{
position:absolute;
top:60px;
right:10px;
background:#111;
border:1px solid #222;
border-radius:10px;
display:none;
flex-direction:column;
width:180px;
z-index:9999;
}

.dropdown a{
padding:12px;
color:#aaa;
text-decoration:none;
border-bottom:1px solid #222;
}

.dropdown a:hover{
color:#ffcc00;
background:#1a1a1a;
}

/* CONTAINER */

.container{
max-width:480px;
margin:auto;
padding:15px;
}

/* SERVICE GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:15px;
}

.card{
background:#111;
border:1px solid #222;
border-radius:18px;
padding:25px 15px;
text-align:center;
cursor:pointer;
transition:.3s;
position:relative;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 15px #ff0044;
border-color:#ff0044;
}

.icon{
font-size:32px;
margin-bottom:10px;
}

.price{
font-size:20px;
color:#ffcc00;
font-weight:700;
}

/* NEXT BUTTON */

.next-btn{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff0044,#7b00ff);
color:white;
font-family:'Orbitron';
font-size:16px;
cursor:pointer;
margin-bottom:15px;
}

/* SERVER GRAPH */

.graph{
background:#111;
border:1px solid #222;
border-radius:15px;
height:120px;
display:flex;
align-items:flex-end;
gap:6px;
padding:10px;
margin-bottom:15px;
}

.bar{
width:10px;
background:#ff0044;
animation:graphMove 2s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:.2s}
.bar:nth-child(3){animation-delay:.4s}
.bar:nth-child(4){animation-delay:.6s}
.bar:nth-child(5){animation-delay:.8s}

@keyframes graphMove{
0%,100%{height:20px}
50%{height:80px}
}

/* BOT STATUS */

.bot-section{
display:flex;
gap:10px;
margin-bottom:15px;
}

.bot-box{
flex:1;
background:#111;
border:1px solid #222;
border-radius:15px;
padding:15px;
text-align:center;
}

.live{
color:#00ff88;
font-size:20px;
}

.busy{
color:#ff4444;
font-size:20px;
}

/* TAGLINE */

.tagline{
background:#0b0b0b;
border-radius:25px;
border:1px solid #222;
padding:12px;
text-align:center;
font-size:12px;
color:#aaa;
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0b0b0b;
border-top:1px solid #222;
padding:15px;
text-align:center;
font-size:12px;
color:#777;
}

/* PARTNERS */

.partners{
margin-top:6px;
color:#aaa;
font-size:11px;
}

/* SUPPORT */

.support{
margin-top:6px;
color:#00ff88;
font-size:12px;
}

/* LIVE USERS */

.users{
margin-top:5px;
color:#ffcc00;
font-size:12px;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">👑 ZEXI BOT</div>

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="dropdown" id="menu">





</div>

</div>

<div class="container">

<div class="grid">

<div class="card" onclick="selectPlan('CS 300 STAR','199')">
<div class="icon">🛡️</div>
<div>300 STAR</div>
<div class="price">₹199</div>
</div>

<div class="card" onclick="selectPlan('CS 1200 STAR','499')">
<div class="icon">🔥</div>
<div>1200 STAR</div>
<div class="price">₹499</div>
</div>

<div class="card" onclick="selectPlan('CS 558 STAR','299')">
<div class="icon">💎</div>
<div>558 STAR</div>
<div class="price">₹299</div>
</div>

<div class="card" onclick="selectPlan('CS 199 STAR','149')">
<div class="icon">👍</div>
<div>199 STAR</div>
<div class="price">₹149</div>
</div>

<button class="next-btn" onclick="goNext()">NEXT</button>

<div class="graph">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

<div class="bot-section">

<div class="bot-box">

<div>Live Bots</div>
<div class="live" id="liveBots">12</div>

</div>

<div class="bot-box">

<div>Busy Bots</div>
<div class="busy" id="busyBots">4</div>

</div>

</div>

<div class="tagline">
⚡ Secure System • 🤖 Auto Bots • 🚀 Fast Processing
</div>

</div>

<!-- FOOTER -->

<div class="footer">

<div class="users">👥 Live Users: <span id="users">152</span></div>

<div class="support">📞 Customer Support: support@zexibot.com</div>

<div class="partners">
Trusted Partners: NovaTech • SkyLabs • QuantumHost • CyberEdge
</div>

<div>© 2026 ZEXI PANEL</div>

</div>

<script>

function toggleMenu(){
let menu=document.getElementById("menu")
menu.style.display = menu.style.display==="flex" ? "none":"flex"
}

let selectedPlan = "";
let selectedPrice = "";

function selectPlan(plan,price){
selectedPlan = plan;
selectedPrice = price;
}

function goNext(){

if(selectedPlan === ""){
alert("Please select a plan first");
return;
}

window.location.href =
`payment.html?plan=${encodeURIComponent(selectedPlan)}&price=${selectedPrice}`;

}

/* RANDOM BOT COUNTER */

setInterval(()=>{
let live=Math.floor(Math.random()*20)+5
let busy=Math.floor(Math.random()*10)+1

document.getElementById("liveBots").innerText=live
document.getElementById("busyBots").innerText=busy
},3000)

/* LIVE USERS */

setInterval(()=>{
document.getElementById("users").innerText=Math.floor(Math.random()*200)+100
},4000)

</script>

</body>
</html>
