<!DOCTYPE html>
<html>
<head>

<title>Bot Processing</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
padding:20px;
}

h2{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #222;
padding:12px;
text-align:center;
}

th{
background:#111;
}

.progress-box{
width:100%;
height:20px;
background:#111;
border-radius:20px;
overflow:hidden;
margin-top:20px;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff0055,#a000ff);
}

.status{
margin-top:15px;
font-weight:bold;
color:#00ff88;
}

</style>

</head>

<body>

<h2>Guild Glory Bot Processing</h2>

<table>

<tr>
<th>Guild UID</th>
<th>Bot</th>
<th>Status</th>
</tr>

<tr>
<td id="uidShow">Loading...</td>
<td>Guild Glory Bot</td>
<td id="status">Processing...</td>
</tr>

</table>

<div class="progress-box">
<div class="progress" id="bar"></div>
</div>

<div class="status" id="result">
Initializing Bots...
</div>

<script>

/* UID LOAD */

let uid = localStorage.getItem("guild_uid");

document.getElementById("uidShow").innerText = uid;

/* PROGRESS SYSTEM */

let progress = 0;

let steps = [
"Connecting server...",
"Checking guild...",
"Loading bot network...",
"Injecting glory bots...",
"Finalizing process..."
];

let stepIndex=0;

let bar = document.getElementById("bar");

let result = document.getElementById("result");

let interval = setInterval(()=>{

progress += 10;

bar.style.width = progress+"%";

result.innerText = steps[Math.min(stepIndex,steps.length-1)];

if(progress%20==0) stepIndex++;

if(progress >=100){

clearInterval(interval);

document.getElementById("status").innerText="Success";

result.innerText="🎉 Glory Bots Successfully Sent!";

}

},500);

</script>

</body>
</html>
