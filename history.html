<!DOCTYPE html>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#000;color:#fff;padding:15px;min-height:100vh;}

.header-container{
display:flex;
justify-content:space-between;
align-items:center;
width:100%;
border-bottom:1px solid rgba(255,255,255,0.1);
padding-bottom:15px;
margin-bottom:20px;

.logo-section{display:flex;align-items:center;gap:10px;}

.logo-box{
background:#e2dcc2;
width:38px;
height:38px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
}

.brand-name{font-size:20px;font-weight:800;}

.actions{display:flex;gap:10px;}

.notification-btn{
position:relative;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:9px;
border-radius:12px;
color:#a1a1aa;
}

.online-dot{
position:absolute;
top:0;
right:0;
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
border:1.5px solid #000;
}

.wallet-btn{
background:rgba(226,220,194,0.1);
border:1px solid rgba(226,220,194,0.2);
color:#e2dcc2;
padding:8px 14px;
border-radius:12px;
font-size:13px;
font-weight:600;
display:flex;
align-items:center;
gap:6px;
}

.wallet-btn span{color:#fff;}

.page-title{
font-family:'Orbitron';
font-size:18px;
text-align:center;
margin-bottom:15px;
color:#ffcc00;
}

.container{
max-width:500px;
margin:auto;
}

.request-box{
background:#111;
border:1px solid #222;
padding:18px;
border-radius:10px;
margin-bottom:15px;
}

.req-row{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:6px;
color:#aaa;
}

.status{
margin-top:8px;
font-size:12px;
color:#ffcc00;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:75px;
background:#050505;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #1a1a1a;
}

.nav-item{
text-decoration:none;
display:flex;
flex-direction:column;
align-items:center;
color:#71717a;
padding:10px;
flex:1;
}

.nav-item.active{
background:#18181b;
color:#fff;
border-radius:14px;
}

.nav-item span{
font-size:11px;
margin-top:4px;
}

.nav-item svg{
width:22px;
height:22px;
}

</style>
</head>
