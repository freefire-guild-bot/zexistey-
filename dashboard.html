/* ---------- DASHBOARD STYLE ---------- */

.card{

padding:18px;

.option-row{display:flex;gap:10px;}

.option-btn.active{

.start-btn{

.status{

padding:12px;

text-align:center;
color:#00ff88;
margin-bottom:12px;
}

.log-box{

border-radius:12px;

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
doc,
updateDoc,
collection,
addDoc,
onSnapshot,
query,
where
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyCvMVx_geWeeiNgw0ziSR80mvncHlOwKQY",
authDomain:"zexi-bot.firebaseapp.com",
projectId:"zexi-bot"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let wallet = 0;
let userId = null;

/* 🔥 LOAD USER + WALLET + AUTO UID */

onAuthStateChanged(auth,(user)=>{

if(!user) return;

userId = user.uid;

const ref = doc(db,"users",user.uid);

onSnapshot(ref,(snap)=>{

if(snap.exists()){

let data = snap.data();

wallet = data.wallet || 0;

document.getElementById("walletBalance").innerText = wallet + " Credits";

/* 🔥 AUTO FILL UID */
if(data.uid){
document.getElementById("uidInput").value = data.uid;
}

}

});

/* 🔔 NOTIFICATION */

const q = query(
collection(db,"notifications"),
where("userId","==",user.uid)
);

onSnapshot(q,(snapshot)=>{

snapshot.forEach((doc)=>{

let data = doc.data();

if(!data.read){
alert("🔔 " + data.message);
}

});

});

});


/* 🔥 START BOT FINAL */

window.startBot = async function(){

let uid = document.getElementById("uidInput").value;
let botCost = Number(document.getElementById("botSelect").value);

if(uid==""){
alert("Enter Guild UID");
return;
}

if(wallet < botCost){
alert("Insufficient Credits");
return;
}

/* 🔥 SAVE UID IN FIRESTORE */
await updateDoc(doc(db,"users",userId),{
uid: uid
});

/* 🔥 DEDUCT WALLET */
wallet -= botCost;

await updateDoc(doc(db,"users",userId),{
wallet: wallet
});

/* 🔥 SAVE TRANSACTION */
await addDoc(collection(db,"transactions"),{
userId:userId,
type:"bot_run",
amount:botCost,
guild:uid,
time: Date.now()
});

/* 🔥 SAVE LOCAL */
localStorage.setItem("guild_uid",uid);

document.getElementById("terminal").innerHTML += "> Bot started successfully...<br>";

setTimeout(()=>{
window.location.href="bot-result.html";
},800);

}


/* OPTION */
window.toggleOption = function(el){
el.classList.toggle("active")
}


/* LOGS */
const logs=[
"Connecting to server...",
"Loading bot modules...",
"Checking security...",
"Syncing region data...",
"Bot network active...",
"Initializing bots..."
];

setInterval(()=>{
let term=document.getElementById("terminal");
term.innerHTML+="> "+logs[Math.floor(Math.random()*logs.length)]+"<br>";
term.scrollTop=term.scrollHeight;
},2000);


/* LIVE COUNTER */
setInterval(()=>{
let live=Math.floor(Math.random()*20)+10;
let busy=Math.floor(Math.random()*10)+1;
document.getElementById("liveBots").innerText=live;
document.getElementById("busyBots").innerText=busy;
},3000);

</script>
