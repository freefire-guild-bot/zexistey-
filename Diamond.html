<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamond SHOP | ZEXI BOT</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Rajdhani',sans-serif;
}

body{
background:#050505;
color:white;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:#0b0b0b;
border-bottom:1px solid #222;
position:relative;
}

.logo{
font-family:'Orbitron';
color:#ffcc00;
font-weight:700;
}

.menu{
font-size:24px;
cursor:pointer;
}

/* DROPDOWN */

.dropdown{
position:absolute;
top:60px;
right:10px;
background:#111;
border:1px solid #222;
border-radius:10px;
display:none;
flex-direction:column;
width:200px;
z-index:100;
}

.dropdown a{
padding:12px;
border-bottom:1px solid #222;
text-decoration:none;
color:#aaa;
}

.dropdown a:hover{
background:#1a1a1a;
color:#ffcc00;
}

/* CONTAINER */

.container{
flex:1;
max-width:450px;
margin:auto;
padding:15px;
}

/* INPUT */

input,select{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #333;
background:#000;
color:white;
margin-bottom:15px;
}

/* DIAMOND GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:15px;
}

.box{
background:#111;
border:1px solid #222;
border-radius:15px;
padding:20px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.box:hover{
border-color:#ff0044;
box-shadow:0 0 10px rgba(255,0,68,.5);
}

.box.active{
background:linear-gradient(45deg,#ff0044,#7b00ff);
}

.diamond{
font-size:22px;
margin-bottom:5px;
}

.price{
color:#ffcc00;
font-size:18px;
margin-top:5px;
}

/* NEXT BUTTON */

.next-btn{
width:100%;
padding:16px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#ff0044,#7b00ff);
color:white;
font-family:'Orbitron';
font-weight:700;
cursor:pointer;
}

/* FOOTER */

.footer{
text-align:center;
padding:12px;
background:#0b0b0b;
border-top:1px solid #222;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">👑 Diamond bot</div>

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="dropdown" id="menu">

<a href="rankbot.html">Rank Push Bot</a>
<a href="dashboard.html">Guild Glory Bot</a>

</div>

</div>

<div class="container">

<input type="number" placeholder="Enter Your UID">

<select>
<option>Select Country / Region</option>
<option>India</option>
<option>Bangladesh</option>
<option>Pakistan</option>
<option>Brazil</option>
<option>Indonesia</option>
<option>Thailand</option>
<option>Vietnam</option>
<option>Singapore</option>
<option>Malaysia</option>
<option>Middle East</option>
</select>

<div class="grid">

<div class="box" onclick="selectDiamond(this)">
<div class="diamond">💎 380 Diamonds</div>
<div>58% Discount</div>
<div class="price">₹80</div>
</div>

<div class="box" onclick="selectDiamond(this)">
<div class="diamond">💎 800 Diamonds</div>
<div>33% Discount</div>
<div class="price">₹160</div>
</div>

<div class="box" onclick="selectDiamond(this)">
<div class="diamond">💎 1600 Diamonds</div>
<div>27% Discount</div>
<div class="price">₹400</div>
</div>

<div class="box" onclick="selectDiamond(this)">
<div class="diamond">💎 2200 Diamonds</div>
<div>44% Discount</div>
<div class="price">₹780</div>
</div>

</div>

<button class="next-btn" onclick="goNext()">NEXT</button>

</div>

<div class="footer">

© 2026 ZEXI BOT PANEL  
<br>
Secure Gaming Services

</div>

<script>

function toggleMenu(){
let menu=document.getElementById("menu")
menu.style.display = menu.style.display==="flex" ? "none":"flex"
}

/* SELECT DIAMOND */

function selectDiamond(el){

document.querySelectorAll(".box").forEach(box=>{
box.classList.remove("active")
})

el.classList.add("active")

}

/* NEXT PAGE */

function goNext(){

let selected=document.querySelector(".box.active")

if(!selected){
alert("Please select diamond package")
return
}

let plan = selected.querySelector(".diamond").innerText
let price = selected.querySelector(".price").innerText.replace("₹","")

window.location.href =
`payment.html?plan=${encodeURIComponent(plan)}&price=${price}`

}

</script>

</body>
</html>
