<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>request | Payment Requests</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Rajdhani:wght@500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Rajdhani',sans-serif;
}

body{
background:#07070a;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* TOP BAR */

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
background:#0f0f14;
border-bottom:1px solid #222;
}

.logo{
font-family:'Orbitron';
color:#ffcc00;
letter-spacing:2px;
font-size:15px;
}

.menu{
font-size:24px;
cursor:pointer;
}

/* HEADER */

.header{
font-family:'Orbitron';
font-size:18px;
padding:20px;
text-align:center;
letter-spacing:2px;
color:#ffcc00;
}

/* REQUEST AREA */

.container{
padding:15px;
flex:1;
}

.request-box{
background:#111;
border:1px solid #222;
padding:18px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.req-row{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:6px;
color:#aaa;
}

.status{
margin-top:8px;
font-size:12px;
color:#999;
}

.footer{
text-align:center;
padding:15px;
background:#0f0f14;
border-top:1px solid #222;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="top-bar">
<div class="logo">👑 ZEXI BOT</div>
</div>

<div class="header">
USER PAYMENT REQUESTS
</div>

<div class="container">
<div id="requests"></div>
</div>

<div class="footer">
© 2026 ZEXI BOT PANEL  
<br>
Secure Gaming Services
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCvMVx_geWeeiNgw0ziSR80mvncHlOwKQY",
authDomain: "zexi-bot.firebaseapp.com",
projectId: "zexi-bot",
storageBucket: "zexi-bot.firebasestorage.app",
messagingSenderId: "245993811972",
appId: "1:245993811972:web:e25ed7ef03d118a4fd8551"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

/* LOAD USER REQUESTS */

async function renderRequests(){

const user = auth.currentUser;

const container = document.getElementById("requests");

container.innerHTML="";

if(!user){
container.innerHTML="<p style='color:#777'>Please login first</p>";
return;
}

/* filter user requests */

const q = query(
collection(db,"payments"),
where("user","==",user.email)
);

const querySnapshot = await getDocs(q);

if(querySnapshot.empty){
container.innerHTML="<p style='color:#777'>No requests yet</p>";
return;
}

querySnapshot.forEach((doc)=>{

let req = doc.data();

let div=document.createElement("div");

div.className="request-box";

div.innerHTML=`

<div class="req-row"><span>Plan</span><span>${req.plan}</span></div>

<div class="req-row"><span>Amount</span><span>₹${req.amount}</span></div>

<div class="req-row"><span>UTR</span><span>${req.utr}</span></div>

<div class="status">Status : ${req.status}</div>

`;

container.appendChild(div);

});

}

setTimeout(renderRequests,1000);

</script>

</body>
</html>
