<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>request | Payment Requests</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Rajdhani:wght@500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Rajdhani',sans-serif;
}

body{
background:#07070a;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* TOP BAR */

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
background:#0f0f14;
border-bottom:1px solid #222;
}

.logo{
font-family:'Orbitron';
color:#ffcc00;
letter-spacing:2px;
font-size:15px;
}

.menu{
font-size:24px;
cursor:pointer;
}

/* DROPDOWN */

.dropdown{
position:absolute;
right:10px;
top:55px;
background:#111;
border:1px solid #333;
border-radius:8px;
display:none;
flex-direction:column;
width:180px;
}

.dropdown a{
padding:12px;
color:#aaa;
text-decoration:none;
border-bottom:1px solid #222;
}

.dropdown a:hover{
background:#1a1a1a;
color:#ffcc00;
}

/* HEADER */

.header{
font-family:'Orbitron';
font-size:18px;
padding:20px;
text-align:center;
letter-spacing:2px;
color:#ffcc00;
}

/* REQUEST AREA */

.container{
padding:15px;
flex:1;
}

.request-box{
background:#111;
border:1px solid #222;
padding:18px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* DOUBLE LINE INFO */

.req-row{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:6px;
color:#aaa;
}

.req-actions{
display:flex;
gap:10px;
margin-top:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
font-size:13px;
}

.approve{
background:#00c853;
color:white;
}

.cancel{
background:#ff3d00;
color:white;
}

.status{
margin-top:8px;
font-size:12px;
color:#999;
}

/* FOOTER */

.footer{
text-align:center;
padding:15px;
background:#0f0f14;
border-top:1px solid #222;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<!-- TOP BAR -->

<div class="top-bar">

<div class="logo">👑 ZEXI BOT</div>

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="dropdown" id="menu">






</div>

</div>

<div class="header">
USER PAYMENT REQUESTS
</div>

<div class="container">

<div id="requests"></div>

</div>

<div class="footer">

© 2026 ZEXI BOT PANEL  
<br>
Secure Gaming Services

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvMVx_geWeeiNgw0ziSR80mvncHlOwKQY",
  authDomain: "zexi-bot.firebaseapp.com",
  projectId: "zexi-bot",
  storageBucket: "zexi-bot.firebasestorage.app",
  messagingSenderId: "245993811972",
  appId: "1:245993811972:web:e25ed7ef03d118a4fd8551"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* MENU */

window.toggleMenu=function(){

let menu=document.getElementById("menu")

menu.style.display = menu.style.display==="flex" ? "none":"flex"

}

/* LOAD REQUESTS FROM FIREBASE */

async function renderRequests(){

const container = document.getElementById("requests");

container.innerHTML="";

const querySnapshot = await getDocs(collection(db,"payments"));

if(querySnapshot.empty){

container.innerHTML="<p style='color:#777'>No requests yet</p>";

return;

}

querySnapshot.forEach((doc)=>{

let req = doc.data();

let div=document.createElement("div");

div.className="request-box";

div.innerHTML=`

<div class="req-row"><span>Plan</span><span>${req.plan}</span></div>

<div class="req-row"><span>Amount</span><span>₹${req.amount}</span></div>

<div class="req-row"><span>UTR</span><span>${req.utr}</span></div>

<div class="status">Status : ${req.status}</div>

`;

container.appendChild(div);

});

}

renderRequests();

</script>

</body>
</html>
