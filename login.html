<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEXIBOT Panel - Auth</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; border: none; }
        body { font-family: 'Rajdhani', sans-serif; background-color: #0f0f0f; background-image: radial-gradient(circle at center, #1a1a1a 0%, #080808 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; color: #ffffff; }
        .glass-card { background-color: rgba(20, 20, 20, 0.9); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; width: 100%; max-width: 420px; padding: 2.5rem 2rem; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7); text-align: center; }
        .logo-container { width: 68px; height: 68px; background-color: #d4c19d; border-radius: 16px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 25px rgba(212, 193, 157, 0.15); }
        .main-title { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.3rem; }
        .sub-title { color: #888; margin-bottom: 2rem; }
        .brand-text { color: #d4c19d; font-weight: 600; }
        .toggle-container { display: flex; background-color: #121212; padding: 6px; border-radius: 12px; margin-bottom: 2rem; border: 1px solid #2a2a2a; }
        .tab-btn { flex: 1; padding: 12px; background-color: transparent; color: #888; border-radius: 10px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.3s ease; }
        .tab-btn.active-si { background-color: #2563eb; color: #ffffff; }
        .tab-btn.active-su { background-color: #10b981; color: #ffffff; }
        .input-group { text-align: left; margin-bottom: 1.2rem; }
        .input-group label { font-size: 11px; text-transform: uppercase; color: #555; margin-left: 5px; display: block; margin-bottom: 5px; }
        .custom-input { width: 100%; padding: 14px 18px; background-color: #121212; border: 1px solid #2a2a2a; border-radius: 14px; color: #ffffff; font-size: 1rem; }
        .main-submit { width: 100%; padding: 16px; background-color: #d4c19d; border-radius: 14px; color: black; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .contact-section { margin-top: 2.5rem; }
        .contact-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; border-radius: 14px; margin-bottom: 10px; text-decoration: none; font-weight: 600; }
        .whatsapp { background-color: #133a20; color: #4ade80; border: 1px solid #22543d; }
        .telegram { background-color: #1a3d54; color: #38bdf8; border: 1px solid #2c5282; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="logo-container">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="black"><path d="M13 10V3L4 14H11V21L20 10H13Z"/></svg>
        </div>
        <h1 class="main-title" id="page-title">Welcome Back</h1>
        <p class="sub-title" id="page-subtitle">Sign in to <span class="brand-text">ZEXIBOT</span> panel</p>

        <div class="toggle-container">
            <button class="tab-btn active-si" id="btn-si" onclick="switchTab('signin')">Sign In</button>
            <button class="tab-btn" id="btn-su" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <form id="auth-form">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" class="custom-input" placeholder="Enter email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" class="custom-input" placeholder="Enter password" required>
            </div>
            <div class="input-group" id="container-confirm" style="display: none;">
                <label>Confirm Password</label>
                <input type="password" id="confirm-password" class="custom-input" placeholder="Confirm your password">
            </div>

            <div class="cf-turnstile" data-sitekey="0x4AAAAAACoC7U-5eZCob0QC" data-theme="dark" style="margin-bottom: 15px;"></div>

            <button type="submit" class="main-submit" id="submit-btn">Sign In</button>
        </form>

        <div class="contact-section">
            <a href="#" class="contact-btn whatsapp">WhatsApp</a>
            <a href="#" class="contact-btn telegram">Telegram</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCvMVx_geWeeiNgw0ziSR80mvncHlOwKQY",
            authDomain: "zexi-bot.firebaseapp.com",
            projectId: "zexi-bot",
            storageBucket: "zexi-bot.firebasestorage.app",
            messagingSenderId: "245993811972",
            appId: "1:245993811972:web:e25ed7ef03d118a4fd8551"
        };
        const auth = getAuth(initializeApp(firebaseConfig));

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const isLogin = document.getElementById('page-title').innerText === "Welcome Back";

            if(!isLogin && password !== confirm) { return alert("Passwords do not match!"); }

            try {
                if(isLogin) await signInWithEmailAndPassword(auth, email, password);
                else await createUserWithEmailAndPassword(auth, email, password);
                alert("Success!");
            } catch(err) { alert(err.message); }
        });
    </script>

    <script>
        function switchTab(mode) {
            const title = document.getElementById('page-title');
            const confirm = document.getElementById('container-confirm');
            const submit = document.getElementById('submit-btn');
            if (mode === 'signup') {
                title.innerText = "Create Account";
                confirm.style.display = 'block';
                submit.innerText = "Create Account";
            } else {
                title.innerText = "Welcome Back";
                confirm.style.display = 'none';
                submit.innerText = "Sign In";
            }
        }
    </script>
</body>
</html>
