<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEXI BOT Interface</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#000;color:#fff;padding:15px;min-height:100vh;padding-bottom:90px;}

/* --- Header Section --- */
.header-container {
display:flex;
justify-content:space-between;
align-items:center;
width:100%;
border-bottom:1px solid rgba(255,255,255,0.1);
padding-bottom:15px;
margin-bottom:20px;
}

.logo-section{display:flex;align-items:center;gap:10px;}

.logo-box{
background:#e2dcc2;
width:38px;
height:38px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
}

.brand-name{font-size:20px;font-weight:800;}

.actions{display:flex;gap:10px;}

.notification-btn{
position:relative;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:9px;
border-radius:12px;
color:#a1a1aa;
}

.online-dot{
position:absolute;
top:0;
right:0;
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
border:1.5px solid #000;
}

.wallet-btn {
background:rgba(226,220,194,0.1);
border:1px solid rgba(226,220,194,0.2);
color:#e2dcc2;
padding:8px 14px;
border-radius:12px;
font-size:13px;
font-weight:600;
display:flex;
align-items:center;
gap:6px;
}

.wallet-btn span { color:#fff; }

/* PAYMENT */

.payment-box{
max-width:420px;
margin:auto;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.1);
border-radius:24px;
padding:25px;
text-align:center;
backdrop-filter:blur(10px);
}

.credit-control{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-bottom:25px;
}

.credit-btn{
width:40px;
height:40px;
border-radius:12px;
border:none;
background:#333;
color:#fff;
font-size:22px;
cursor:pointer;
}

.amount{
font-size:32px;
font-weight:800;
color:#e2dcc2;
margin-bottom:20px;
}

.qr-box{
background:#fff;
padding:10px;
border-radius:20px;
width:200px;
margin:auto;
margin-bottom:25px;
}

.qr-box img{
width:100%;
border-radius:10px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #333;
background:#050505;
color:#fff;
text-align:center;
margin-bottom:15px;
}

.verify-btn{
width:100%;
padding:15px;
border-radius:12px;
border:none;
background:#e2dcc2;
color:#000;
font-weight:800;
cursor:pointer;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:75px;
background:#050505;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #1a1a1a;
}

.nav-item{
text-decoration:none;
display:flex;
flex-direction:column;
align-items:center;
color:#71717a;
padding:10px;
border-radius:14px;
flex:1;
}

.nav-item.active{
background:#18181b;
color:#f4f4f5;
}

.nav-item span{
font-size:11px;
margin-top:4px;
}

.nav-item svg{
width:22px;
height:22px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header-container">
<div class="logo-section">
<div class="logo-box">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><path d="M13 2 L3 14 L12 14 L11 22 L21 10 L12 10 Z"/></svg>
</div>
<h1 class="brand-name">ZEXI BOT</h1>
</div>

<div class="actions">
<div class="notification-btn">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
<span class="online-dot"></span>
</div>

<div class="wallet-btn">
Wallet: <span id="walletBalance">0 Credits</span>
</div>
</div>
</div>

<!-- PAYMENT -->

<div class="payment-box">

<div class="credit-control">

<button class="credit-btn" onclick="changeCredit(-1)">-</button>

<div style="font-size:24px;font-weight:800">
<span id="credits">50</span>
</div>

<button class="credit-btn" onclick="changeCredit(1)">+</button>

</div>

<div id="amount" class="amount">₹4000</div>

<div class="qr-box">
<img id="qr">
</div>

<input type="text" id="utr" placeholder="Enter 12 Digit UTR">

<button class="verify-btn" onclick="verifyPayment()">VERIFY PAYMENT</button>

</div>

<!-- ORIGINAL NAVIGATION -->

<nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span>Home</span>
        </a>
        <a href="transactions.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
            <span>Transactions</span>
        </a>
        <a href="diamond.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>
            <span>Discount</span>
        </a>
        <a href="history.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>History</span>
        </a>
        <a href="account.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Account</span>
        </a>
    </nav>

<!-- 🔥 ONLY SCRIPT UPDATED (बाकी design same रखा है) -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
collection,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCvMVx_geWeeiNgw0ziSR80mvncHlOwKQY",
authDomain: "zexi-bot.firebaseapp.com",
projectId: "zexi-bot"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;
let userGuildUID = "";

/* 🔥 LOAD USER + UID */

onAuthStateChanged(auth, async(user)=>{

if(!user){
alert("Login required");
window.location.href="login.html";
return;
}

currentUser = user;

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

if(snap.exists()){

let data = snap.data();

/* WALLET */
document.getElementById("walletBalance").innerText =
(data.wallet || 0) + " Credits";

/* 🔥 GET UID */
userGuildUID = data.uid || "";

}else{

await setDoc(ref,{
email:user.email,
wallet:0
});

}

});


/* CREDIT SYSTEM */

let credits = 50;
const price = 80;
const upiID = "BHARATPE.8Y0B1Q2W4G55700@fbpe";

window.changeCredit = function(v){

credits = Math.max(1,credits+v);

document.getElementById("credits").innerText = credits;

updateQR();

}

function updateQR(){

let amount = credits * price;

document.getElementById("amount").innerText = "₹"+amount;

let upi = `upi://pay?pa=${upiID}&pn=ZEXI&am=${amount}&cu=INR`;

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(upi);

}


/* 🔥 VERIFY PAYMENT FINAL */

window.verifyPayment = async function(){

let utr = document.getElementById("utr").value;

if(utr.length < 12){
alert("Enter valid UTR");
return;
}

if(!currentUser){
alert("Login required");
return;
}

/* 🔥 SAVE PAYMENT WITH FULL DATA */

await addDoc(collection(db,"payments"),{

email: currentUser.email,
userId: currentUser.uid,

/* 🔥 IMPORTANT */
uid: userGuildUID,   // 👈 GUILD UID

credits: credits,
amount: credits * price,
utr: utr,

status: "pending",

time: Date.now(),    // 👈 readable time
date: serverTimestamp()

});

/* 🔔 ADMIN NOTIFICATION */

await addDoc(collection(db,"notifications"),{
userId: "admin",
message: "New Payment Request from " + currentUser.email,
read: false,
time: Date.now()
});

alert("Payment request submitted ✅");

document.getElementById("utr").value="";

}

updateQR();

</script>

</body>
</html>
