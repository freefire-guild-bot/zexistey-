<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secure Settlement | VIP Console</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

:root{
--gold:#ffcc00;
--accent:#22d3ee;
--red:#ff0044;
--bg:#020202;
--glass:rgba(255,255,255,0.03);
--border:rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Rajdhani',sans-serif;
background:var(--bg);
color:#fff;
display:flex;
flex-direction:column;
min-height:100vh;
overflow-x:hidden;
}

/* TOP BAR */

.top-bar{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
background:#0b0b0b;
border-bottom:1px solid var(--border);
z-index:2000;
}

.jacky{
font-family:'Orbitron';
color:var(--gold);
font-size:14px;
letter-spacing:2px;
}

/* HAMBURGER */

.menu-btn{
font-size:22px;
cursor:pointer;
}

/* DROPDOWN */

.dropdown{
position:absolute;
top:55px;
right:10px;
background:#111;
border:1px solid var(--border);
border-radius:10px;
display:none;
flex-direction:column;
width:190px;
}

.dropdown a{
padding:12px;
color:#aaa;
text-decoration:none;
border-bottom:1px solid #222;
}

.dropdown a:hover{
background:#1a1a1a;
color:var(--gold);
}

/* BG */

.bg-glow{
position:fixed;
width:400px;
height:400px;
background:radial-gradient(circle,rgba(34,211,238,0.1)0%,transparent 70%);
top:-100px;
right:-100px;
z-index:-1;
}

/* PAYMENT */

.payment-container{
width:95%;
max-width:420px;
background:var(--glass);
backdrop-filter:blur(20px);
border:1px solid var(--border);
border-radius:35px;
padding:30px;
margin:90px auto 40px auto;
box-shadow:0 25px 50px rgba(0,0,0,0.5);
}

/* HEADER HUD */

.header-hud{
text-align:center;
margin-bottom:25px;
border-bottom:1px solid var(--border);
padding-bottom:15px;
}

.header-hud h2{
font-family:'Orbitron';
font-size:16px;
letter-spacing:3px;
color:var(--accent);
}

.header-hud .haider{
font-family:'Orbitron';
font-size:14px;
color:var(--gold);
margin-top:5px;
}

/* STATUS */

.status-strip{
display:flex;
justify-content:space-between;
font-size:10px;
font-family:'Orbitron';
margin-bottom:20px;
}

.live-dot{
height:6px;
width:6px;
background:#00ff00;
border-radius:50%;
display:inline-block;
margin-right:5px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

/* INFO */

.info-card{
background:rgba(0,0,0,0.4);
border:1px solid var(--border);
border-radius:20px;
padding:15px;
text-align:center;
margin-bottom:25px;
}

#plan-title{
font-size:12px;
color:#888;
letter-spacing:2px;
text-transform:uppercase;
}

#amount-text{
font-family:'Orbitron';
font-size:38px;
color:var(--gold);
margin-top:5px;
}

/* QR */

.qr-wrapper{
position:relative;
background:#fff;
padding:15px;
border-radius:25px;
width:200px;
height:200px;
margin:0 auto 15px;
}

.qr-wrapper img{
width:100%;
border-radius:10px;
}

.scan-line{
position:absolute;
top:15px;
left:15px;
width:calc(100% - 30px);
height:2px;
background:var(--accent);
animation:scan 3s infinite ease-in-out;
}

@keyframes scan{
0%,100%{top:15px}
50%{top:calc(100% - 17px)}
}

/* INPUT */

.input-box{
margin-bottom:20px;
}

.input-box label{
display:block;
font-size:11px;
color:#555;
margin-bottom:8px;
text-align:center;
}

.input-box input{
width:100%;
padding:16px;
background:rgba(0,0,0,0.5);
border:1px solid var(--border);
border-radius:15px;
color:var(--gold);
font-family:'JetBrains Mono';
outline:none;
text-align:center;
font-size:16px;
}

/* BUTTON */

.pay-btn{
width:100%;
padding:18px;
border-radius:18px;
border:none;
background:linear-gradient(45deg,var(--accent),#1d4ed8);
color:#fff;
font-family:'Orbitron';
font-weight:900;
cursor:pointer;
}

/* FOOTER */

.footer{
margin-top:auto;
width:100%;
background:#0b0b0b;
border-top:1px solid var(--border);
text-align:center;
padding:15px;
font-size:12px;
color:#777;
}

.support{color:var(--accent);margin-top:5px;}
.partners{margin-top:6px;font-size:11px;color:#aaa;}
.users{color:var(--gold);margin-top:5px;}

</style>
</head>

<body>

<div class="top-bar">

<div class="jacky">👑 ZEXI BOT</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>



<div class="bg-glow"></div>

<div class="payment-container">

<div class="header-hud">
<h2>SECURE SETTLEMENT</h2>
<div class="haider">Guild Glory Bot</div>
</div>

<div class="status-strip">
<div><span class="live-dot"></span> NODE: ACTIVE</div>
<div style="color:var(--red);">TIME: <span id="timer">05:00</span></div>
</div>

<div class="info-card">
<div id="plan-title">LOADING TIER...</div>
<div id="amount-text">₹0</div>
</div>

<div class="qr-wrapper">
<div class="scan-line"></div>
<img id="qr-img" src="">
</div>

<div class="mobile-pay-hint" onclick="openUpiApp()">
📲 Mobile User? Click to Pay via App
</div>

<div class="input-box">
<label>ENTER 12-DIGIT UTR / REF NO.</label>
<input type="text" id="utr" maxlength="12">
</div>

<button class="pay-btn" onclick="startVerify()">VERIFY TRANSACTION</button>

</div>

<div class="footer">

<div class="users">👥 Live Users: <span id="users">145</span></div>

<div class="support">📞 Customer Support: support@jackybot.com</div>

<div class="partners">
Partners: NovaTech • SkyLabs • QuantumHost • CyberEdge
</div>

<div>© 2026 JACKY PANEL</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvMVx_geWeeiNgw0ziSR80mvncHlOwKQY",
  authDomain: "zexi-bot.firebaseapp.com",
  projectId: "zexi-bot",
  storageBucket: "zexi-bot.firebasestorage.app",
  messagingSenderId: "245993811972",
  appId: "1:245993811972:web:e25ed7ef03d118a4fd8551"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* MENU */

window.toggleMenu=function(){
let menu=document.getElementById("menu")
menu.style.display = menu.style.display==="flex" ? "none":"flex"
}

/* PLAN DATA */

const params=new URLSearchParams(window.location.search);
const plan=params.get('plan')||"VIP Tier";
const price=params.get('price')||"0";
const upiID="BHARATPE.8Y0B1Q2W4G55700@fbpe";

document.getElementById('plan-title').innerText=plan;
document.getElementById('amount-text').innerText=`₹${price}`;

const upiUri=`upi://pay?pa=${upiID}&pn=VIP_CONSOLE&am=${price}&cu=INR`;

document.getElementById('qr-img').src=
`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiUri)}`;

window.openUpiApp=function(){
window.location.href=upiUri;
}

/* TIMER */

let time=300;

setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;
document.getElementById('timer').innerText=`0${m}:${s<10?'0':''}${s}`;
if(time>0)time--;
},1000);

/* LIVE USERS */

setInterval(()=>{
document.getElementById("users").innerText=Math.floor(Math.random()*200)+100
},4000);

/* VERIFY PAYMENT */

window.startVerify=async function(){

const utrValue=document.getElementById('utr').value;

if(utrValue.length<12){
alert("⚠️ Error: UTR must be exactly 12 digits.");
return;
}

try{

await addDoc(collection(db,"payments"),{

plan:plan,
amount:price,
utr:utrValue,
status:"Pending",
time:Date.now()

});

alert("Payment request submitted. Waiting for admin approval.");

window.location.href="request.html";

}

catch(error){

alert("Error submitting request");

console.error(error);

}

}

/* UTR FILTER */

document.getElementById('utr').addEventListener('input',function(){
this.value=this.value.replace(/[^0-9]/g,'');
});

</script>

</body>
</html>
