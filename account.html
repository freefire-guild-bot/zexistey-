<style>

/* --- Base Setup --- */

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background-color:#000;
color:#fff;
padding:15px;
min-height:100vh;
padding-bottom:90px;
}

/* --- Header --- */

.header-container{
display:flex;
justify-content:space-between;
align-items:center;
width:100%;
border-bottom:1px solid rgba(255,255,255,0.1);
padding-bottom:15px;
margin-bottom:20px;
}

.logo-section{display:flex;align-items:center;gap:10px;}

.logo-box{
background-color:#e2dcc2;
width:38px;
height:38px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
}

.brand-name{font-size:20px;font-weight:800;}

.actions{display:flex;align-items:center;gap:10px;}

.notification-btn{
position:relative;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:9px;
border-radius:12px;
color:#a1a1aa;
}

.online-dot{
position:absolute;
top:0;
right:0;
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
}

/* Wallet Button */

.wallet-btn {
background:rgba(226,220,194,0.1);
border:1px solid rgba(226,220,194,0.2);
color:#e2dcc2;
padding:8px 14px;
border-radius:12px;
font-size:13px;
font-weight:600;
display:flex;
align-items:center;
gap:6px;
}

.wallet-btn span { color:#fff; }

/* --- Account Card --- */

.account-card{
background:#0f0f0f;
border:1px solid #1a1a1a;
border-radius:16px;
padding:20px;
margin-top:10px;
}

.user-email{
color:#e2dcc2;
font-size:14px;
margin-top:5px;
}

/* Services */

.services{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:20px;
}

.service-box{
background:#111;
border:1px solid #222;
padding:16px;
border-radius:14px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.service-box:hover{
background:#1a1a1a;
}

/* Table */

.table{
margin-top:20px;
border:1px solid #1a1a1a;
border-radius:12px;
overflow:hidden;
}

.table-row{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #1a1a1a;
}

.table-row:last-child{
border-bottom:none;
}

/* Logout */

.logout{
margin-top:20px;
background:#ff3b3b;
border:none;
padding:12px;
width:100%;
border-radius:10px;
color:#fff;
font-weight:600;
cursor:pointer;
}

/* Bottom Nav */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:75px;
background:#050505;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #1a1a1a;
}

.nav-item{
text-decoration:none;
display:flex;
flex-direction:column;
align-items:center;
color:#71717a;
padding:10px;
flex:1;
}

.nav-item.active{
background:#18181b;
color:#fff;
border-radius:14px;
}

.nav-item span{
font-size:11px;
margin-top:4px;
}

.nav-item svg{
width:22px;
height:22px;
}

</style>
</head>

<!-- 🔥 ONLY SCRIPT UPDATED (design same रखा है) -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { 
getFirestore,
doc,
getDoc,
setDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

/* FIREBASE */

const firebaseConfig = {
apiKey: "AIzaSyCvMVx_geWeeiNgw0ziSR80mvncHlOwKQY",
authDomain: "zexi-bot.firebaseapp.com",
projectId: "zexi-bot"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* 🔥 USER LOAD FINAL */

onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location.href="login.html";
return;
}

/* EMAIL */
document.getElementById("userEmail").innerText = user.email;

/* USER ID */
document.getElementById("userId").innerText = user.uid;

const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

let wallet = 0;

if(!snap.exists()){

await setDoc(ref,{
email:user.email,
wallet:0,
online:true,
uid:"",          // 👈 IMPORTANT
createdAt: Date.now(),
lastLogin: Date.now()
});

wallet = 0;

}else{

let data = snap.data();

wallet = data.wallet || 0;

/* 🔥 UPDATE ONLINE + LAST LOGIN */
await updateDoc(ref,{
online:true,
lastLogin: Date.now()
});

}

/* WALLET */
document.getElementById("walletBalance").innerText = wallet + " Credits";

});


/* 🔥 LOGOUT FINAL */

document.getElementById("logoutBtn").onclick = async function(){

const user = auth.currentUser;

if(user){

await updateDoc(doc(db,"users",user.uid),{
online:false
});

}

await signOut(auth);

window.location.href = "login.html";

}

</script>
